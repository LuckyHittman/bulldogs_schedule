<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scray Hill – Bulldogs Schedule</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Arial Black', Arial, sans-serif;
      background: #000;
      padding: 16px;
    }

    h1 {
      text-align: center;
      margin-bottom: 24px;
      font-size: 1.6rem;
      color: #ff6da2;
      text-transform: uppercase;
      letter-spacing: 3px;
      text-shadow: 0 0 12px rgba(255, 109, 162, 0.7);
    }

    .game-card {
      background: #111;
      border: 2px solid #23bbad;
      max-width: 540px;
      margin: 0 auto 32px auto;
      width: 100%;
      box-shadow: 0 0 16px rgba(35, 187, 173, 0.4);
    }

    .game-card .row {
      border-bottom: 1px solid #333;
      text-align: center;
      padding: 8px 12px;
      font-size: 0.95rem;
      color: #e0e0e0;
      letter-spacing: 0.5px;
    }

    .game-card .row:last-child {
      border-bottom: none;
    }

    .game-card .row.game-title {
      background: #23bbad;
      color: #fff;
      font-size: 1.05rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 10px 12px;
    }

    .game-card .row.matchup {
      color: #ff6da2;
      font-weight: bold;
      font-size: 1rem;
    }

    .game-card .map-row {
      padding: 0;
    }

    .game-card .map-row img {
      width: 100%;
      display: block;
    }
  </style>
</head>
<body>

  <h1>Bulldogs 2026 Schedule</h1>

  <div id="games"></div>

  <script>
    const games = [
      { date: "4/12/2026", time: "1:00 PM", field: "2", home: "Sharks",    away: "Bulldogs" },
      { date: "4/19/2026", time: "3:00 PM", field: "2", home: "Bulldogs",  away: "Hawks"    },
      { date: "4/19/2026", time: "4:00 PM", field: "3", home: "Phantoms",  away: "Bulldogs" },
      { date: "4/26/2026", time: "3:00 PM", field: "3", home: "Bulldogs",  away: "Cobras"   },
      { date: "5/3/2026",  time: "2:00 PM", field: "3", home: "Cobras",    away: "Bulldogs" },
      { date: "5/17/2026", time: "2:00 PM", field: "4", home: "Predators", away: "Bulldogs" },
      { date: "5/17/2026", time: "3:00 PM", field: "1", home: "Bulldogs",  away: "Sharks"   },
      { date: "5/31/2026", time: "1:00 PM", field: "6", home: "Hawks",     away: "Bulldogs" },
    ];

    const DAYS   = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const MONTHS = ["January","February","March","April","May","June",
                    "July","August","September","October","November","December"];

    function formatDate(dateStr) {
      const [m, d, y] = dateStr.split("/").map(Number);
      const dt = new Date(y, m - 1, d);
      return `${DAYS[dt.getDay()]} ${MONTHS[dt.getMonth()]} ${d}, ${y}`;
    }

    const container = document.getElementById("games");

    games.forEach((g, i) => {
      const card = document.createElement("div");
      card.className = "game-card";

      card.innerHTML = `
        <div class="row game-title">Game ${i + 1}</div>
        <div class="row">${formatDate(g.date)}</div>
        <div class="row">Scray Hill &#8211; FIELD ${g.field}</div>
        <div class="row">${g.time}</div>
        <div class="row matchup">${g.home} v. ${g.away} (Home v. Away)</div>
        <div class="row map-row">
          <img src="gamedaymap.png" alt="Scray Hill Park Map" />
        </div>
      `;

      container.appendChild(card);
    });
  </script>

</body>
</html>
